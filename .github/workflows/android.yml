name: Build Trend Thala AI APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK packages
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Download Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Create native Android WebView project
        run: |
          mkdir -p app/src/main/java/com/kaushikin/trendthalaai
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "TrendThalaAI"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.6.1" apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.kaushikin.trendthalaai"
              compileSdk 35

              defaultConfig {
                  applicationId "com.kaushikin.trendthalaai"
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName "1.0"
              }
          }

          dependencies {
              implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="Trend Thala AI"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true"
                  android:resizeableActivity="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>

              </application>

          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#ff6a00</item>
              </style>
          </resources>
          EOF

          python3 -m pip install pillow

          python3 <<'PY'
          from PIL import Image
          import os

          source = "app_icon.png"

          if not os.path.exists(source):
              raise FileNotFoundError("app_icon.png not found. Upload app_icon.png to repo root.")

          sizes = {
              "mipmap-mdpi": 48,
              "mipmap-hdpi": 72,
              "mipmap-xhdpi": 96,
              "mipmap-xxhdpi": 144,
              "mipmap-xxxhdpi": 192,
          }

          img = Image.open(source).convert("RGBA")

          for folder, size in sizes.items():
              path = f"app/src/main/res/{folder}"
              os.makedirs(path, exist_ok=True)

              resized = img.resize((size, size), Image.LANCZOS)
              resized.save(f"{path}/ic_launcher.png")
              resized.save(f"{path}/ic_launcher_round.png")

          print("Launcher icons generated successfully.")
          PY

          cat > app/src/main/java/com/kaushikin/trendthalaai/MainActivity.java <<'EOF'
          package com.kaushikin.trendthalaai;

          import android.app.Activity;
          import android.app.DownloadManager;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.Environment;
          import android.content.Intent;
          import android.content.Context;
          import android.content.ActivityNotFoundException;
          import android.content.ClipData;
          import android.net.Uri;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.net.ConnectivityManager;
          import android.net.Network;
          import android.net.NetworkCapabilities;
          import android.view.Gravity;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceError;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.CookieManager;
          import android.webkit.DownloadListener;
          import android.webkit.URLUtil;
          import android.widget.Button;
          import android.widget.FrameLayout;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.swiperefreshlayout.widget.SwipeRefreshLayout;

          public class MainActivity extends Activity {

              private WebView webView;
              private FrameLayout rootLayout;
              private SwipeRefreshLayout swipeRefreshLayout;
              private LinearLayout splashLayout;
              private LinearLayout noInternetLayout;

              private ValueCallback<Uri[]> fileUploadCallback;

              private static final int FILE_CHOOSER_REQUEST_CODE = 101;
              private static final String APP_URL = "https://content-creation-black.vercel.app/";
              private static final String MAIN_HOST = "content-creation-black.vercel.app";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);

                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );

                  createRootLayout();
                  createWebView();
                  createSwipeRefreshLayout();
                  createSplashScreen();
                  createNoInternetScreen();

                  setContentView(rootLayout);

                  showSplashScreen();

                  new Handler(Looper.getMainLooper()).postDelayed(new Runnable() {
                      @Override
                      public void run() {
                          loadApp();
                      }
                  }, 1500);
              }

              private void createRootLayout() {
                  rootLayout = new FrameLayout(this);
                  rootLayout.setLayoutParams(new FrameLayout.LayoutParams(
                      ViewGroup.LayoutParams.MATCH_PARENT,
                      ViewGroup.LayoutParams.MATCH_PARENT
                  ));
              }

              private void createWebView() {
                  webView = new WebView(this);
                  webView.setBackgroundColor(Color.WHITE);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setBuiltInZoomControls(false);
                  settings.setDisplayZoomControls(false);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(
                              WebView webView,
                              ValueCallback<Uri[]> filePathCallback,
                              FileChooserParams fileChooserParams
                      ) {
                          if (fileUploadCallback != null) {
                              fileUploadCallback.onReceiveValue(null);
                              fileUploadCallback = null;
                          }

                          fileUploadCallback = filePathCallback;

                          Intent intent;

                          try {
                              intent = fileChooserParams.createIntent();
                          } catch (Exception e) {
                              intent = new Intent(Intent.ACTION_GET_CONTENT);
                              intent.addCategory(Intent.CATEGORY_OPENABLE);
                              intent.setType("*/*");
                          }

                          intent.putExtra(Intent.EXTRA_ALLOW_MULTIPLE, true);

                          try {
                              startActivityForResult(intent, FILE_CHOOSER_REQUEST_CODE);
                          } catch (ActivityNotFoundException e) {
                              fileUploadCallback = null;
                              return false;
                          }

                          return true;
                      }
                  });

                  webView.setDownloadListener(new DownloadListener() {
                      @Override
                      public void onDownloadStart(
                              String url,
                              String userAgent,
                              String contentDisposition,
                              String mimeType,
                              long contentLength
                      ) {
                          handleDownload(url, userAgent, contentDisposition, mimeType);
                      }
                  });

                  webView.setWebViewClient(new WebViewClient() {

                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          if (request != null && request.getUrl() != null) {
                              return handleUrl(request.getUrl().toString());
                          }
                          return false;
                      }

                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          return handleUrl(url);
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);

                          if (swipeRefreshLayout != null) {
                              swipeRefreshLayout.setRefreshing(false);
                          }

                          hideSplashAndNoInternet();
                      }

                      @Override
                      public void onReceivedError(WebView view, WebResourceRequest request, WebResourceError error) {
                          super.onReceivedError(view, request, error);

                          if (swipeRefreshLayout != null) {
                              swipeRefreshLayout.setRefreshing(false);
                          }

                          if (request != null && request.isForMainFrame()) {
                              showNoInternetScreen();
                          }
                      }
                  });
              }

              private void createSwipeRefreshLayout() {
                  swipeRefreshLayout = new SwipeRefreshLayout(this);
                  swipeRefreshLayout.setColorSchemeColors(
                      Color.rgb(255, 106, 0),
                      Color.rgb(255, 0, 80),
                      Color.rgb(120, 50, 255)
                  );

                  swipeRefreshLayout.addView(webView, new SwipeRefreshLayout.LayoutParams(
                      ViewGroup.LayoutParams.MATCH_PARENT,
                      ViewGroup.LayoutParams.MATCH_PARENT
                  ));

                  swipeRefreshLayout.setOnRefreshListener(new SwipeRefreshLayout.OnRefreshListener() {
                      @Override
                      public void onRefresh() {
                          if (isInternetAvailable()) {
                              noInternetLayout.setVisibility(View.GONE);
                              swipeRefreshLayout.setVisibility(View.VISIBLE);

                              if (webView.getUrl() == null) {
                                  webView.loadUrl(APP_URL);
                              } else {
                                  webView.reload();
                              }
                          } else {
                              swipeRefreshLayout.setRefreshing(false);
                              showNoInternetScreen();
                          }
                      }
                  });

                  rootLayout.addView(swipeRefreshLayout, new FrameLayout.LayoutParams(
                      ViewGroup.LayoutParams.MATCH_PARENT,
                      ViewGroup.LayoutParams.MATCH_PARENT
                  ));
              }

              private void createSplashScreen() {
                  splashLayout = new LinearLayout(this);
                  splashLayout.setOrientation(LinearLayout.VERTICAL);
                  splashLayout.setGravity(Gravity.CENTER);
                  splashLayout.setPadding(40, 40, 40, 40);

                  GradientDrawable bg = new GradientDrawable(
                      GradientDrawable.Orientation.TOP_BOTTOM,
                      new int[] {
                          Color.rgb(10, 10, 20),
                          Color.rgb(65, 20, 90),
                          Color.rgb(255, 90, 0)
                      }
                  );
                  splashLayout.setBackground(bg);

                  TextView title = new TextView(this);
                  title.setText("Trend Thala AI");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(34);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setGravity(Gravity.CENTER);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("AI Content Creation Studio");
                  subtitle.setTextColor(Color.rgb(245, 245, 245));
                  subtitle.setTextSize(16);
                  subtitle.setGravity(Gravity.CENTER);
                  subtitle.setPadding(0, 15, 0, 35);

                  ProgressBar progressBar = new ProgressBar(this);
                  progressBar.setIndeterminate(true);

                  TextView loading = new TextView(this);
                  loading.setText("Loading...");
                  loading.setTextColor(Color.WHITE);
                  loading.setTextSize(14);
                  loading.setGravity(Gravity.CENTER);
                  loading.setPadding(0, 25, 0, 0);

                  splashLayout.addView(title);
                  splashLayout.addView(subtitle);
                  splashLayout.addView(progressBar);
                  splashLayout.addView(loading);

                  rootLayout.addView(splashLayout, new FrameLayout.LayoutParams(
                      ViewGroup.LayoutParams.MATCH_PARENT,
                      ViewGroup.LayoutParams.MATCH_PARENT
                  ));
              }

              private void createNoInternetScreen() {
                  noInternetLayout = new LinearLayout(this);
                  noInternetLayout.setOrientation(LinearLayout.VERTICAL);
                  noInternetLayout.setGravity(Gravity.CENTER);
                  noInternetLayout.setPadding(45, 45, 45, 45);
                  noInternetLayout.setBackgroundColor(Color.rgb(15, 15, 20));

                  TextView icon = new TextView(this);
                  icon.setText("📡");
                  icon.setTextSize(54);
                  icon.setGravity(Gravity.CENTER);

                  TextView title = new TextView(this);
                  title.setText("No Internet Connection");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(25);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setGravity(Gravity.CENTER);
                  title.setPadding(0, 25, 0, 10);

                  TextView message = new TextView(this);
                  message.setText("Please check your network and try again.");
                  message.setTextColor(Color.rgb(210, 210, 210));
                  message.setTextSize(16);
                  message.setGravity(Gravity.CENTER);
                  message.setPadding(0, 0, 0, 30);

                  Button retryButton = new Button(this);
                  retryButton.setText("Retry");
                  retryButton.setTextSize(16);
                  retryButton.setTextColor(Color.WHITE);
                  retryButton.setAllCaps(false);

                  GradientDrawable buttonBg = new GradientDrawable();
                  buttonBg.setColor(Color.rgb(255, 106, 0));
                  buttonBg.setCornerRadius(50);
                  retryButton.setBackground(buttonBg);

                  LinearLayout.LayoutParams buttonParams = new LinearLayout.LayoutParams(
                      ViewGroup.LayoutParams.MATCH_PARENT,
                      120
                  );
                  buttonParams.setMargins(30, 10, 30, 0);

                  retryButton.setLayoutParams(buttonParams);

                  retryButton.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          showSplashScreen();

                          new Handler(Looper.getMainLooper()).postDelayed(new Runnable() {
                              @Override
                              public void run() {
                                  loadApp();
                              }
                          }, 800);
                      }
                  });

                  noInternetLayout.addView(icon);
                  noInternetLayout.addView(title);
                  noInternetLayout.addView(message);
                  noInternetLayout.addView(retryButton);

                  rootLayout.addView(noInternetLayout, new FrameLayout.LayoutParams(
                      ViewGroup.LayoutParams.MATCH_PARENT,
                      ViewGroup.LayoutParams.MATCH_PARENT
                  ));

                  noInternetLayout.setVisibility(View.GONE);
              }

              private boolean handleUrl(String url) {
                  if (url == null || url.trim().isEmpty()) {
                      return false;
                  }

                  try {
                      Uri uri = Uri.parse(url);
                      String scheme = uri.getScheme();
                      String host = uri.getHost();

                      if ((url.startsWith("http://") || url.startsWith("https://"))
                              && host != null
                              && host.equals(MAIN_HOST)) {
                          return false;
                      }

                      if (url.startsWith("http://") || url.startsWith("https://")) {
                          openExternalUrl(url);
                          return true;
                      }

                      if (scheme != null) {
                          if (
                              scheme.equals("tel") ||
                              scheme.equals("mailto") ||
                              scheme.equals("sms") ||
                              scheme.equals("whatsapp") ||
                              scheme.equals("tg") ||
                              scheme.equals("instagram") ||
                              scheme.equals("fb") ||
                              scheme.equals("market")
                          ) {
                              openExternalUrl(url);
                              return true;
                          }
                      }

                      if (url.startsWith("intent://")) {
                          try {
                              Intent intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);

                              if (intent != null) {
                                  startActivity(intent);
                                  return true;
                              }
                          } catch (Exception e) {
                              return true;
                          }
                      }

                  } catch (Exception e) {
                      return false;
                  }

                  return false;
              }

              private void openExternalUrl(String url) {
                  try {
                      Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                      startActivity(intent);
                  } catch (Exception e) {
                      Toast.makeText(this, "No app found to open this link", Toast.LENGTH_SHORT).show();
                  }
              }

              private void handleDownload(String url, String userAgent, String contentDisposition, String mimeType) {
                  if (url == null || url.trim().isEmpty()) {
                      Toast.makeText(this, "Invalid download link", Toast.LENGTH_SHORT).show();
                      return;
                  }

                  if (url.startsWith("blob:")) {
                      Toast.makeText(
                          this,
                          "Blob downloads need website-side download support",
                          Toast.LENGTH_LONG
                      ).show();
                      return;
                  }

                  try {
                      String fileName = URLUtil.guessFileName(url, contentDisposition, mimeType);

                      DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                      request.setTitle(fileName);
                      request.setDescription("Downloading file...");
                      request.setMimeType(mimeType);
                      request.setNotificationVisibility(
                          DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED
                      );

                      String cookies = CookieManager.getInstance().getCookie(url);
                      if (cookies != null) {
                          request.addRequestHeader("Cookie", cookies);
                      }

                      if (userAgent != null) {
                          request.addRequestHeader("User-Agent", userAgent);
                      }

                      request.allowScanningByMediaScanner();
                      request.setDestinationInExternalPublicDir(
                          Environment.DIRECTORY_DOWNLOADS,
                          fileName
                      );

                      DownloadManager downloadManager =
                          (DownloadManager) getSystemService(Context.DOWNLOAD_SERVICE);

                      if (downloadManager != null) {
                          downloadManager.enqueue(request);
                          Toast.makeText(this, "Download started", Toast.LENGTH_SHORT).show();
                      } else {
                          Toast.makeText(this, "Download manager not available", Toast.LENGTH_SHORT).show();
                      }

                  } catch (Exception e) {
                      Toast.makeText(this, "Download failed", Toast.LENGTH_SHORT).show();
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);

                  if (requestCode == FILE_CHOOSER_REQUEST_CODE) {
                      if (fileUploadCallback == null) {
                          return;
                      }

                      Uri[] results = null;

                      if (resultCode == RESULT_OK) {
                          if (data != null) {
                              String dataString = data.getDataString();
                              ClipData clipData = data.getClipData();

                              if (clipData != null) {
                                  results = new Uri[clipData.getItemCount()];

                                  for (int i = 0; i < clipData.getItemCount(); i++) {
                                      results[i] = clipData.getItemAt(i).getUri();
                                  }
                              } else if (dataString != null) {
                                  results = new Uri[] { Uri.parse(dataString) };
                              }
                          }
                      }

                      fileUploadCallback.onReceiveValue(results);
                      fileUploadCallback = null;
                  }
              }

              private void loadApp() {
                  if (isInternetAvailable()) {
                      splashLayout.setVisibility(View.VISIBLE);
                      noInternetLayout.setVisibility(View.GONE);
                      swipeRefreshLayout.setVisibility(View.VISIBLE);
                      webView.setVisibility(View.VISIBLE);
                      webView.loadUrl(APP_URL);
                  } else {
                      showNoInternetScreen();
                  }
              }

              private boolean isInternetAvailable() {
                  try {
                      ConnectivityManager connectivityManager =
                          (ConnectivityManager) getSystemService(CONNECTIVITY_SERVICE);

                      if (connectivityManager == null) {
                          return false;
                      }

                      Network network = connectivityManager.getActiveNetwork();

                      if (network == null) {
                          return false;
                      }

                      NetworkCapabilities capabilities =
                          connectivityManager.getNetworkCapabilities(network);

                      return capabilities != null &&
                          capabilities.hasCapability(NetworkCapabilities.NET_CAPABILITY_INTERNET);

                  } catch (Exception e) {
                      return false;
                  }
              }

              private void showSplashScreen() {
                  if (splashLayout != null) {
                      splashLayout.setVisibility(View.VISIBLE);
                  }

                  if (noInternetLayout != null) {
                      noInternetLayout.setVisibility(View.GONE);
                  }

                  if (swipeRefreshLayout != null) {
                      swipeRefreshLayout.setVisibility(View.VISIBLE);
                  }

                  if (webView != null) {
                      webView.setVisibility(View.VISIBLE);
                  }
              }

              private void showNoInternetScreen() {
                  if (splashLayout != null) {
                      splashLayout.setVisibility(View.GONE);
                  }

                  if (swipeRefreshLayout != null) {
                      swipeRefreshLayout.setRefreshing(false);
                      swipeRefreshLayout.setVisibility(View.GONE);
                  }

                  if (webView != null) {
                      webView.setVisibility(View.GONE);
                  }

                  if (noInternetLayout != null) {
                      noInternetLayout.setVisibility(View.VISIBLE);
                  }
              }

              private void hideSplashAndNoInternet() {
                  if (splashLayout != null) {
                      splashLayout.setVisibility(View.GONE);
                  }

                  if (noInternetLayout != null) {
                      noInternetLayout.setVisibility(View.GONE);
                  }

                  if (swipeRefreshLayout != null) {
                      swipeRefreshLayout.setRefreshing(false);
                      swipeRefreshLayout.setVisibility(View.VISIBLE);
                  }

                  if (webView != null) {
                      webView.setVisibility(View.VISIBLE);
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.getVisibility() == View.VISIBLE && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trend-thala-ai-apk
          path: app/build/outputs/apk/debug/*.apk
