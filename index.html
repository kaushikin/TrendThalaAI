<script>
  let finalOutput = "";

  // Image Upload
  const imageUpload = document.getElementById('imageUpload');
  if (imageUpload) {
    imageUpload.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        window.imageBase64 = ev.target.result.split(',')[1];
        window.imageMime = file.type;
        const preview = document.getElementById('imagePreview');
        if (preview) {
          preview.src = ev.target.result;
          preview.style.display = 'block';
        }
      };
      reader.readAsDataURL(file);
    });
  }

  async function generatePack() {
    const btn = document.querySelector('.primary');
    const originalText = btn.textContent;
    btn.textContent = '🤖 Generating Mr.Tamilan Style...';
    btn.disabled = true;

    const data = {
      topic: document.getElementById('topic').value.trim(),
      details: document.getElementById('details').value.trim(),
      links: document.getElementById('links')?.value.trim() || '',
      mood: document.getElementById('mood').value,
      figure: document.getElementById('figure').value.trim(),
      colors: document.getElementById('colors').value,
      effect: document.getElementById('effect').value,
      imageBase64: window.imageBase64 || null,
      imageMime: window.imageMime || null
    };

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      finalOutput = result.content || "Generation completed.";
    } catch (e) {
      finalOutput = "API failed. Please try again later.";
    }

    document.getElementById('output').innerHTML = formatWithCopyButtons(finalOutput);
    document.getElementById('output').style.display = 'block';

    btn.textContent = originalText;
    btn.disabled = false;
  }

  function formatWithCopyButtons(text) {
    let html = `<div style="background:rgba(0,0,0,0.4); padding:18px; border-radius:16px; white-space:pre-wrap; font-size:15px; line-height:1.65;">${text}</div>`;

    const parts = text.match(/PART \d+:[^]*?(?=PART \d+:|$)/g) || [];
    parts.forEach((part, i) => {
      const num = i + 1;
      html += `
        <button onclick="copyPart(${num})" style="margin:8px 4px; padding:12px 20px; background:#22c55e; color:#000; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">
          📋 Copy PART ${num}
        </button>`;
    });

    return html;
  }

  function copyPart(num) {
    const parts = finalOutput.match(/PART \d+:[^]*?(?=PART \d+:|$)/g) || [];
    if (parts[num-1]) {
      navigator.clipboard.writeText(parts[num-1].trim());
      alert(`✅ PART ${num} Copied!`);
    }
  }

  function copyOutput() {
    navigator.clipboard.writeText(finalOutput);
    alert("✅ Full Content Pack Copied!");
  }
</script>
