<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Creation App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #7c2d12);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .card {
      max-width: 500px;
      background: rgba(0, 0, 0, 0.35);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      background: #f97316;
      color: white;
      border-radius: 999px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Content Creation App</h1>
    <p>Your web app is now live and ready for APK conversion.</p>
    <div class="badge">Deployment Test Successful</div>
  </div>
</body>
</html>
