<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trend Thala AI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #080812, #3b0764, #ff6a00);
      color: white; min-height: 100vh; padding: 18px;
    }
    .app { max-width: 560px; margin: 0 auto; padding-bottom: 40px; }
    .hero { text-align: center; padding: 34px 20px 24px; border-radius: 28px; background: rgba(0,0,0,0.42); box-shadow: 0 20px 50px rgba(0,0,0,0.35); backdrop-filter: blur(10px); margin-top: 20px; }
    .logo { width: 86px; height: 86px; margin: 0 auto 16px; border-radius: 24px; background: linear-gradient(135deg, #ff6a00, #db2777, #7c3aed); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; box-shadow: 0 15px 35px rgba(255,106,0,0.35); }
    h1 { margin: 0; font-size: 36px; line-height: 1.1; }
    .tagline { margin: 12px 0 0; font-size: 17px; line-height: 1.5; color: #f4f4f5; }
    .badge-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 20px; }
    .badge { padding: 9px 12px; background: rgba(255,255,255,0.13); border-radius: 999px; font-size: 13px; font-weight: bold; }
    .card { margin-top: 18px; padding: 22px; border-radius: 24px; background: rgba(0,0,0,0.43); box-shadow: 0 14px 35px rgba(0,0,0,0.28); backdrop-filter: blur(8px); }
    label { display: block; font-size: 15px; font-weight: bold; margin: 15px 0 8px; }
    input, textarea, select { width: 100%; border: none; outline: none; padding: 15px; border-radius: 15px; font-size: 16px; background: rgba(255,255,255,0.95); color: #111827; }
    textarea { min-height: 90px; resize: vertical; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { width: 100%; border: none; border-radius: 16px; padding: 16px 18px; margin-top: 12px; color: white; font-size: 17px; font-weight: 900; cursor: pointer; }
    .primary { background: linear-gradient(45deg, #ff6a00, #ff004c); }
    .secondary { background: linear-gradient(45deg, #7c3aed, #db2777); }
    .dark { background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.18); }
    .output { white-space: pre-wrap; background: rgba(0,0,0,0.35); padding: 18px; border-radius: 16px; line-height: 1.6; font-size: 15px; margin-top: 10px; }
    .preview { max-width: 100%; border-radius: 16px; margin: 10px 0; border: 2px solid #ff6a00; }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="logo">TT AI</div>
      <h1>Trend Thala AI</h1>
      <p class="tagline">Tamil creators-க்கான AI content factory</p>
    </section>

    <section class="card">
      <div class="section-title">Create Viral Content Pack</div>

      <label>Topic / News Headline</label>
      <input id="topic" placeholder="Example: Vijay political meeting creates buzz" />

      <label>Key Details</label>
      <textarea id="details" placeholder="Bullet points..."></textarea>

      <label>Source / Reference Links</label>
      <textarea id="links" placeholder="https://...\nhttps://..."></textarea>

      <label>Reference Image (Optional)</label>
      <input type="file" id="imageUpload" accept="image/*" />
      <img id="imagePreview" class="preview" style="display:none;" />

      <div class="grid">
        <div><label>Mood</label><select id="mood"><option>Dramatic</option><option>Shocking</option><option>Emotional</option><option>Angry</option><option>Funny</option></select></div>
        <div><label>Main Figure</label><input id="figure" placeholder="Vijay / Modi" /></div>
      </div>

      <div class="grid">
        <div><label>Color Style</label><select id="colors"><option>Dark political</option><option>Saffron red</option><option>Neon</option><option>Blue serious</option></select></div>
        <div><label>Effect</label><select id="effect"><option>Fire</option><option>Lightning</option><option>Glitch</option><option>Smoke</option><option>Cinematic</option></select></div>
      </div>

      <button class="btn primary" onclick="generatePack()">Generate AI Content Pack</button>
      <button class="btn secondary" onclick="copyOutput()">Copy Full Pack</button>
      <button class="btn dark" onclick="copyGrokImage()">Copy Grok Image Prompt</button>
      <button class="btn dark" onclick="copyGrokVideo()">Copy Grok Video Prompt</button>

      <div id="output" class="output"></div>
    </section>
  </div>

  <script>
    let finalOutput = "";
    let grokImageP = "";
    let grokVideoP = "";
    let imageBase64 = null;
    let imageMime = null;

    document.getElementById('imageUpload').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        imageBase64 = ev.target.result.split(',')[1];
        imageMime = file.type;
        document.getElementById('imagePreview').src = ev.target.result;
        document.getElementById('imagePreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    async function generatePack() {
      const btn = document.querySelector('.primary');
      btn.textContent = 'Generating...';
      btn.disabled = true;

      const data = {
        topic: document.getElementById('topic').value,
        details: document.getElementById('details').value,
        links: document.getElementById('links').value,
        mood: document.getElementById('mood').value,
        figure: document.getElementById('figure').value,
        colors: document.getElementById('colors').value,
        effect: document.getElementById('effect').value,
        imageBase64, imageMime
      };

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
        const result = await res.json();
        finalOutput = result.content;
        grokImageP = result.grokImagePrompt;
        grokVideoP = result.grokVideoPrompt;
      } catch(e) {
        finalOutput = "API error. Please try again.";
      }

      document.getElementById('output').innerText = finalOutput;
      btn.textContent = 'Generate AI Content Pack';
      btn.disabled = false;
    }

    function copyOutput() { navigator.clipboard.writeText(finalOutput); alert("Full Pack Copied!"); }
    function copyGrokImage() { navigator.clipboard.writeText(grokImageP); alert("Grok Image Prompt Copied!"); }
    function copyGrokVideo() { navigator.clipboard.writeText(grokVideoP); alert("Grok Video Prompt Copied!"); }
  </script>
</body>
</html>
