  <title>Trend Thala AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #09090f, #3b0764, #ff6a00);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

    }

    p {
      font-size: 17px;
      line-height: 1.5;
      color: #f3f3f3;
    }

    .btn {
      display: block;
      margin: 14px 0;
      padding: 16px 18px;
      border-radius: 14px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }

    .telegram {
      background: #229ED9;
    }

    .instagram {
      background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
    }

    .youtube {
      background: #ff0000;
    }

    .whatsapp {
      background: #25D366;
    }

    .badge {
      margin-top: 20px;
      padding: 12px 18px;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      font-weight: bold;
      font-size: 14px;
    }

</head>
