<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trend Thala AI - Mr Tamilan Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Noto Sans Tamil', Arial, sans-serif;
      background: linear-gradient(135deg, #080812, #3b0764, #ff6a00);
      color: white; min-height: 100vh; padding: 16px;
    }
    .app { max-width: 560px; margin: 0 auto; padding-bottom: 60px; }
    .hero { text-align: center; padding: 30px 20px; border-radius: 28px; background: rgba(0,0,0,0.45); margin-bottom: 20px; }
    .logo { width: 90px; height: 90px; margin: 0 auto 12px; border-radius: 50%; background: linear-gradient(135deg, #ff6a00, #db2777); display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; }
    h1 { margin: 0; font-size: 32px; }
    .tagline { font-size: 16px; color: #ddd; margin-top: 8px; }
    .card { margin-top: 18px; padding: 24px; border-radius: 24px; background: rgba(0,0,0,0.45); }
    label { display: block; font-weight: bold; margin: 16px 0 8px; font-size: 15px; }
    input, textarea, select { width: 100%; padding: 14px; border-radius: 15px; border: none; font-size: 16px; background: #fff; color: #111; font-family: 'Noto Sans Tamil', Arial, sans-serif; }
    textarea { min-height: 100px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn { width: 100%; padding: 16px; margin: 12px 0 8px; border: none; border-radius: 16px; font-size: 17px; font-weight: 900; cursor: pointer; font-family: 'Noto Sans Tamil', Arial, sans-serif; }
    .primary { background: linear-gradient(45deg, #ff6a00, #ff004c); }
    .secondary { background: linear-gradient(45deg, #7c3aed, #db2777); }
    .output { margin-top: 20px; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 16px; line-height: 1.7; font-size: 15.2px; white-space: pre-wrap; font-family: 'Noto Sans Tamil', Arial, sans-serif; }
    .preview { max-width: 100%; border-radius: 16px; margin: 12px 0; border: 3px solid #ff6a00; }
    .spinner { display: none; border: 5px solid #f3f3f3; border-top: 5px solid #ff6a00; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .copy-btn { margin: 8px 4px; padding: 11px 18px; background: #22c55e; color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Noto Sans Tamil', Arial, sans-serif; }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="logo">TT</div>
      <h1>Trend Thala AI</h1>
      <p class="tagline">Mr Tamilan Style • Tamil SEO • வைரல் ஷார்ட்ஸ்</p>
    </section>

    <section class="card">
      <div class="section-title">Create Viral Content Pack</div>

      <label>Topic / News Headline</label>
      <input id="topic" placeholder="விஜய் TVK மீட்டிங் தமிழ்நாட்டில் பெரும் பரபரப்பு" />

      <label>Key Details</label>
      <textarea id="details" placeholder="முக்கிய புள்ளிகள்..."></textarea>

      <label>Source / Reference Links</label>
      <textarea id="links" placeholder="https://..."></textarea>

      <label>Reference Image (Optional)</label>
      <input type="file" id="imageUpload" accept="image/*" />
      <img id="imagePreview" class="preview" style="display:none;" />

      <div class="grid">
        <div><label>Mood</label><select id="mood"><option>Dramatic</option><option>Shocking</option><option>Emotional</option><option>Angry</option><option>Funny</option></select></div>
        <div><label>Main Figure</label><input id="figure" placeholder="Vijay / Modi" /></div>
      </div>

      <div class="grid">
        <div><label>Color Style</label><select id="colors"><option>Dark political</option><option>Saffron red</option><option>Neon</option></select></div>
        <div><label>Effect</label><select id="effect"><option>Fire</option><option>Lightning</option><option>Cinematic</option></select></div>
      </div>

      <button class="btn primary" onclick="generatePack()" id="generateBtn">🤖 Generate Mr Tamilan Style Pack</button>
      <button class="btn secondary" onclick="copyOutput()">📋 Copy Full Pack</button>

      <div class="spinner" id="spinner"></div>
      <div id="output" class="output" style="display:none;"></div>
    </section>
  </div>

  <script>
    let finalOutput = "";
    let imageBase64 = null;
    let imageMime = null;

    document.getElementById('imageUpload').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        imageBase64 = ev.target.result.split(',')[1];
        imageMime = file.type;
        const preview = document.getElementById('imagePreview');
        preview.src = ev.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    async function generatePack() {
      const btn = document.getElementById('generateBtn');
      const spinner = document.getElementById('spinner');
      const outputDiv = document.getElementById('output');

      btn.disabled = true;
      spinner.style.display = 'block';
      outputDiv.style.display = 'none';

      const data = {
        topic: document.getElementById('topic').value.trim(),
        details: document.getElementById('details').value.trim(),
        links: document.getElementById('links').value.trim(),
        mood: document.getElementById('mood').value,
        figure: document.getElementById('figure').value.trim(),
        colors: document.getElementById('colors').value,
        effect: document.getElementById('effect').value,
        imageBase64: imageBase64,
        imageMime: imageMime
      };

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        finalOutput = result.content || "Generation completed.";
      } catch (e) {
        finalOutput = "❌ API failed. Please try again.";
      }

      outputDiv.innerHTML = formatWithCopyButtons(finalOutput);
      outputDiv.style.display = 'block';
      spinner.style.display = 'none';
      btn.disabled = false;
    }

    function formatWithCopyButtons(text) {
      let html = `<div style="background:rgba(0,0,0,0.4);padding:18px;border-radius:14px;">${text}</div>`;
      const parts = text.match(/PART \d+:[^]*?(?=PART \d+:|$)/g) || [];
      parts.forEach((part, i) => {
        const num = i + 1;
        html += `<button onclick="copyPart(${num})" class="copy-btn">📋 Copy PART ${num}</button>`;
      });
      return html;
    }

    function copyPart(num) {
      const parts = finalOutput.match(/PART \d+:[^]*?(?=PART \d+:|$)/g) || [];
      if (parts[num-1]) {
        let content = parts[num-1].replace(/^PART \d+:\s*/i, '').trim();
        navigator.clipboard.writeText(content);
        alert(`✅ PART ${num} Content Copied!`);
      }
    }

    function copyOutput() {
      if (finalOutput) {
        navigator.clipboard.writeText(finalOutput);
        alert("✅ Full Pack Copied!");
      }
    }
  </script>
</body>
</html>
