<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trend Thala AI - Shorts Only</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Noto Sans Tamil', Arial, sans-serif;
      background: linear-gradient(135deg, #080812, #3b0764, #ff6a00);
      color: white; min-height: 100vh; padding: 16px;
    }
    .app { max-width: 560px; margin: 0 auto; padding-bottom: 60px; }
    .hero { text-align: center; padding: 30px 20px; border-radius: 28px; background: rgba(0,0,0,0.45); margin-bottom: 20px; }
    .logo { width: 90px; height: 90px; margin: 0 auto 12px; border-radius: 50%; background: linear-gradient(135deg, #ff6a00, #db2777); display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; }
    h1 { margin: 0; font-size: 32px; }
    .tagline { font-size: 16px; color: #ddd; margin-top: 8px; }
    .card { margin-top: 18px; padding: 24px; border-radius: 24px; background: rgba(0,0,0,0.45); }
    label { display: block; font-weight: bold; margin: 16px 0 8px; font-size: 15px; }
    input, textarea, select { width: 100%; padding: 14px; border-radius: 15px; border: none; font-size: 16px; background: #fff; color: #111; }
    textarea { min-height: 80px; }
    .btn { width: 100%; padding: 16px; margin: 12px 0 8px; border: none; border-radius: 16px; font-size: 17px; font-weight: 900; cursor: pointer; }
    .primary { background: linear-gradient(45deg, #ff6a00, #ff004c); }
    .secondary { background: linear-gradient(45deg, #7c3aed, #db2777); }
    .output { margin-top: 20px; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 16px; line-height: 1.7; font-size: 15.2px; white-space: pre-wrap; }
    .preview { max-width: 100%; border-radius: 16px; margin: 12px 0; border: 3px solid #ff6a00; }
    .spinner { display: none; border: 5px solid #f3f3f3; border-top: 5px solid #ff6a00; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .copy-btn { margin: 8px 4px; padding: 11px 18px; background: #22c55e; color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="logo">TT</div>
      <h1>Trend Thala AI</h1>
      <p class="tagline">YouTube Shorts Only • Mr Tamilan Style • Viral Hooks</p>
    </section>

    <section class="card">
      <div class="section-title">Create Viral YouTube Short</div>

      <label>Topic / News Headline</label>
      <input id="topic" placeholder="விஜய் TVK மீட்டிங் பெரும் பரபரப்பு" />

      <label>Key Details</label>
      <textarea id="details" placeholder="முக்கிய புள்ளிகள்..."></textarea>

      <label>Source / Reference Links</label>
      <textarea id="links" placeholder="https://..."></textarea>

      <label>Special Instructions / Customization</label>
      <textarea id="custom" placeholder="No voice over needed\nMake it more shocking\nOnly image and video prompts"></textarea>

      <label>Reference Image (Optional)</label>
      <input type="file" id="imageUpload" accept="image/*" />
      <img id="imagePreview" class="preview" style="display:none;" />

      <div class="grid">
        <div><label>Mood</label><select id="mood"><option>Dramatic</option><option>Shocking</option><option>Emotional</option><option>Angry</option><option>Funny</option></select></div>
        <div><label>Main Figure</label><input id="figure" placeholder="Vijay / Modi" /></div>
      </div>

      <button class="btn primary" onclick="generatePack()" id="generateBtn">🤖 Generate Viral YouTube Short Pack</button>
      <button class="btn secondary" onclick="copyOutput()">📋 Copy Full Pack</button>

      <div class="spinner" id="spinner"></div>
      <div id="output" class="output" style="display:none;"></div>
    </section>
  </div>

<script>
let finalOutput = "";

function getValue(id, fallback = "") {
  const el = document.getElementById(id);
  return el && el.value.trim() ? el.value.trim() : fallback;
}

function generateLocalPack() {
  // Same reliable local fallback as before
  const topic = getValue("topic", "Trending Tamil news update");
  const details = getValue("details", "- Key detail 1\n- Key detail 2");
  const mood = getValue("mood", "Dramatic");
  const figure = getValue("figure", "None");

  finalOutput = `🔥 TREND THALA AI CONTENT PACK

TOPIC: ${topic}

KEY DETAILS:
${details}

MOOD: ${mood}
MAIN FIGURE: ${figure}

----------------------------------------
[Local fallback generated - AI is better when working]
`;

  const output = document.getElementById("output");
  output.style.display = "block";
  output.textContent = finalOutput;
}

async function generatePack() {
  const topic = getValue("topic");
  if (!topic) {
    alert("Topic / News Headline போடுங்க!");
    return;
  }

  const btn = document.querySelector('.btn.primary') || document.querySelector('button[onclick*="generatePack"]');
  const originalText = btn ? btn.textContent : "Generate";

  const outputEl = document.getElementById("output");
  outputEl.style.display = "block";
  outputEl.textContent = "🤖 Trend Thala AI generating viral pack...\n\n(5-12 seconds)";

  if (btn) {
    btn.disabled = true;
    btn.textContent = "Generating with AI... 🔥";
  }

  try {
    const payload = {
      topic: topic,
      details: getValue("details"),
      sourceLinks: getValue("sourceLinks", ""),
      specialInstructions: getValue("specialInstructions", ""),
      mood: getValue("mood", "Dramatic"),
      figure: getValue("figure", "None"),
      colors: getValue("colors", "Dark political"),
      effect: getValue("effect", "Fire")
    };

    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (data.success && data.content) {
      finalOutput = data.content;
      outputEl.textContent = finalOutput;
    } else {
      throw new Error("API failed");
    }
  } catch (err) {
    console.log("AI failed → fallback");
    generateLocalPack();
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = originalText;
    }
  }

  outputEl.scrollIntoView({ behavior: "smooth" });
}

async function copyOutput() {
  if (!finalOutput) {
    await generatePack();
    return;
  }
  try {
    await navigator.clipboard.writeText(finalOutput);
    const status = document.getElementById("copyStatus");
    if (status) status.style.display = "block";
    setTimeout(() => { if (status) status.style.display = "none"; }, 2200);
  } catch (e) {}
}
</script>
  
</body>
</html>
